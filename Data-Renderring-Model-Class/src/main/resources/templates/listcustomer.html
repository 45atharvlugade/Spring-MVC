<!DOCTYPE html>
<html  lang="en" xmlns:th="https://www.thymeleaf.org">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
</head>
<body>

<h1>List of Model Class Objects</h1>
<h2>Listing the Customer Id  : </span></h2>

<!-- get the specific value of the Customer -->
<table border="5px" >
    <tr>
    <th> Customer id </th>
    <th> Name </th>
    <th> City </th>
    <th> Salary </th>
    </tr>
    
    <tr th:each="cust : ${listCustomer}">
    <td th:text="${cust.cno}"></td> 
     <td th:text="${cust.cname}"></td> 
      <td th:text="${cust.caddress}"></td> 
       <td th:text="${cust.billAmount}"></td> 
    </tr>
 
</table>

<h1> Output directly without table</h1>

<h2 th:each="cust : ${listCustomer}">  <span th:text="${cust}"></span></h2>

<h1> Applying the if else like </h1>

<!-- If  -->
<div th:if="${listCustomer!=null and !listCustomer.isEmpty()}">
<h2 th:each="cust : ${listCustomer}">
<span th:text="${cust}"></span>
</h2>
</div>

<!-- Else  -->
<div th:unless="${listCustomer != null and !listCustomer.isEmpty()}">
<h2>No records Found</h2>
</div>


</body>
</html>
